{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-8 col-md-5 col-lg-4">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h4 class="card-title text-center mb-1">Sistema de Empréstimo</h4>
                <p class="text-center text-muted mb-4" style="font-size: 0.9rem;">Faça login para continuar</p>

                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <div class="alert alert-danger py-2" role="alert">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label for="login" class="form-label">Login</label>
                        <input type="text" id="login" name="login" class="form-control" placeholder="Digite seu login" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" id="senha" name="senha" class="form-control" placeholder="Digite sua senha" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">Entrar</button>
                </form>

                <hr class="my-3">

                <p class="text-center mb-0" style="font-size: 0.85rem;">
                    Não tem conta? <a href="/cadastrar">Cadastre-se</a>
                </p>

            </div>
        </div>

    </div>
</div>
{% endblock %}
